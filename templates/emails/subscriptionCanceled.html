<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscription Canceled</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#14213d;">
  <div style="max-width:640px;margin:0 auto;padding:32px 20px;">
    <div style="background:#ffffff;border:1px solid #e6ebf5;border-radius:20px;overflow:hidden;">
      <div style="padding:28px 32px;background:linear-gradient(135deg,#5b1220,#c2415a);color:#ffffff;">
        <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;opacity:0.82;">ReplyCraft Billing</div>
        <h1 style="margin:12px 0 0;font-size:28px;line-height:1.2;">Subscription Canceled</h1>
      </div>
      <div style="padding:32px;">
        <p style="margin:0 0 16px;font-size:16px;">Hi {{name}},</p>
        <p style="margin:0 0 16px;font-size:15px;line-height:1.7;">Your ReplyCraft subscription has been canceled and your account is now on the <strong>Free</strong> plan.</p>
        <p style="margin:0 0 16px;font-size:15px;line-height:1.7;">If this was not expected, contact support or re-activate a paid plan from your billing dashboard.</p>
        <p style="margin:0;font-size:14px;line-height:1.7;color:#5d6985;">Cancellation recorded on {{canceledAt}}.</p>
      </div>
    </div>
  </div>
</body>
</html>
