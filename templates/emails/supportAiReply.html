<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#162033;">
  <div style="padding:32px 16px;">
    <div style="max-width:720px;margin:0 auto;background:#ffffff;border:1px solid #e8edf6;border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(15,23,42,0.08);">
      <div style="padding:28px 32px;background:linear-gradient(135deg,#12203d,#355cff);color:#ffffff;">
        <div style="font-size:13px;letter-spacing:0.18em;text-transform:uppercase;opacity:0.8;">ReplyCraft Support</div>
        <h1 style="margin:12px 0 0;font-size:28px;line-height:1.2;">{{subject}}</h1>
        <p style="margin:10px 0 0;font-size:14px;line-height:1.7;opacity:0.9;">Ticket {{ticketId}}</p>
      </div>
      <div style="padding:32px;">
        <p style="margin:0 0 18px;font-size:15px;line-height:1.8;color:#475569;">Hi {{name}},</p>
        <div style="font-size:15px;line-height:1.9;color:#1f2937;">{{messageHtml}}</div>
        <div style="margin-top:28px;padding:18px 20px;border-radius:20px;background:#f8fbff;border:1px solid #dbeafe;">
          <p style="margin:0;font-size:13px;line-height:1.8;color:#64748b;">
            If this resolves your issue, reply to let us know and we’ll close the ticket. If not, respond to this email and we’ll keep working on it.
          </p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
