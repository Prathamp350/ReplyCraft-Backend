<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,Helvetica,sans-serif;color:#14213d;">
  <div style="padding:32px 16px;">
    <div style="max-width:720px;margin:0 auto;background:#ffffff;border:1px solid #e8edf6;border-radius:28px;overflow:hidden;box-shadow:0 20px 60px rgba(15,23,42,0.08);">
      <div style="padding:32px;background:linear-gradient(135deg,#2f43ff,#0ea5e9 55%,#10b981);color:#ffffff;">
        <div style="font-size:13px;letter-spacing:0.2em;text-transform:uppercase;opacity:0.85;">ReplyCraft Update</div>
        <h1 style="margin:14px 0 8px;font-size:30px;line-height:1.2;">{{subject}}</h1>
        <p style="margin:0;font-size:15px;line-height:1.7;opacity:0.92;">{{preheader}}</p>
      </div>

      <div style="padding:32px;">
        <p style="margin:0 0 20px;font-size:16px;line-height:1.8;color:#4b5563;">Hi {{name}},</p>
        <div style="font-size:15px;line-height:1.9;color:#243047;">{{messageHtml}}</div>

        <div style="margin-top:28px;padding:18px 20px;border-radius:20px;background:#f8fbff;border:1px solid #dbeafe;">
          <p style="margin:0;font-size:13px;line-height:1.8;color:#64748b;">
            You’re receiving this email because you have a ReplyCraft account. If you need help, contact us at
            <a href="mailto:{{supportEmail}}" style="color:#335cff;text-decoration:none;"> {{supportEmail}}</a>.
          </p>
        </div>
      </div>

      <div style="padding:18px 32px;background:#f8fafc;border-top:1px solid #e8edf6;">
        <p style="margin:0;font-size:12px;line-height:1.7;color:#94a3b8;">
          ReplyCraft • Customer review automation for modern teams
        </p>
      </div>
    </div>
  </div>
</body>
</html>
